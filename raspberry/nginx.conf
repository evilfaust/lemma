# Конфигурация Nginx для EGE Tasks Manager на Raspberry Pi
# Расположение: /etc/nginx/sites-available/ege-app

server {
    listen 80;
    listen [::]:80;

    # Для доступа по IP
    server_name _;

    # Логи
    access_log /var/log/nginx/ege-app-access.log;
    error_log /var/log/nginx/ege-app-error.log;

    # Размер загружаемых файлов (для изображений задач)
    client_max_body_size 50M;

    # Корневая директория для статических файлов (собранный фронтенд)
    root /home/faust/ege-app/frontend;
    index index.html;

    # ======================================================================
    # API PocketBase
    # ======================================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Таймауты для длинных запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ======================================================================
    # Admin PocketBase
    # ======================================================================
    location /_/ {
        proxy_pass http://127.0.0.1:8090/_/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ======================================================================
    # PDF Service (Puppeteer)
    # ======================================================================
    location /pdf/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличенные таймауты для генерации PDF
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Размер буфера для больших PDF
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ======================================================================
    # Статические файлы фронтенда
    # ======================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Кэширование статических ресурсов
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Отключаем кэш для HTML (чтобы обновления сразу применялись)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ======================================================================
    # Gzip сжатие
    # ======================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
}
