# ============================================================================
# Nginx для Raspberry Pi — только статический фронтенд
# Backend (PocketBase + PDF) на VPS: https://task-ege.oipav.ru
# Расположение: /etc/nginx/sites-available/ege-app
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /home/faust/ege-app/frontend;
    index index.html;

    # Логи
    access_log /var/log/nginx/ege-app-access.log;
    error_log /var/log/nginx/ege-app-error.log;

    # SPA: все маршруты → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Кэширование статических ресурсов (JS, CSS, шрифты, картинки)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML — без кэша (обновления сразу видны)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               font/truetype font/opentype image/svg+xml;

    client_max_body_size 10M;
}
