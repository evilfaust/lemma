name: Deploy Landing to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, vps-lemma]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ege-tasks/package-lock.json

      - name: Install dependencies
        run: cd ege-tasks && npm ci

      - name: Build landing page
        run: cd ege-tasks && npx vite build --config vite.config.landing.js

      - name: Deploy landing to nginx root
        run: |
          cp ege-tasks/dist/landing.html ege-tasks/dist/index.html
          rsync -avzr --delete ege-tasks/dist/ /var/www/landings/lemma/
