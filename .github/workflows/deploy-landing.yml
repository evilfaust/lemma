name: Deploy Landing to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ege-tasks/package-lock.json

      - name: Install dependencies
        run: cd ege-tasks && npm ci

      - name: Build landing page
        run: cd ege-tasks && npx vite build --config vite.config.js

      - name: Rename landing.html to index.html
        run: mv ege-tasks/dist/landing.html ege-tasks/dist/index.html

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ege-tasks/dist/
          remote_path: /var/www/landings/lemma/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
